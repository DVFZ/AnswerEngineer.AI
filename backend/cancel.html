<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Cancelled — AnswerEngineer.AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #6d28d9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .icon {
      font-size: 60px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    p {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 30px;
      line-height: 1.5;
    }
    button {
      background: linear-gradient(135deg, #fde68a 0%, #f472b6 100%);
      border: none;
      color: #1e3a8a;
      padding: 12px 32px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
    .note {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 20px;
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⏸️</div>
    <h1>Payment Cancelled</h1>
    <p>Your payment was not completed. You're still on the <strong>Free Plan</strong>.</p>

    <div class="note">
      <p style="margin-bottom: 10px;">No worries! You can try upgrading again anytime:</p>
      <ul style="text-align: left; list-style: none;">
        <li>✓ Click the "UPGRADE" button in the extension</li>
        <li>✓ Complete the Stripe checkout</li>
        <li>✓ Enjoy premium features instantly</li>
      </ul>
    </div>

    <button onclick="goBack()" style="margin-top: 20px;">Return to Extension</button>
  </div>

  <script>
    function goBack() {
      if (window.opener) {
        window.close();
      } else {
        window.history.back();
      }
    }

    // Auto-close after 8 seconds
    setTimeout(goBack, 8000);
  </script>
</body>
</html>
